<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Загрузка сервера</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 15%; background: #1a1a1a; color: #eee; }
        .loader { border: 4px solid #333; border-top: 4px solid #00d4ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 1.2em; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Сервер просыпается</h1>
    <div class="loader"></div>
    <div id="status">Включаем питание через MQTT...</div>

    <script>
        // Открываем канал Server-Sent Events
        const evtSource = new EventSource("/events");

        evtSource.onmessage = function(event) {
            if (event.data === "ready") {
                document.getElementById('status').innerText = "Сервер онлайн! Перенаправляем...";
                evtSource.close(); // Закрываем канал
                
                // Перезагружаем страницу, чтобы Nginx (теперь уже наш aiohttp) 
                // пустил нас на основной сайт
                setTimeout(() => window.location.reload(), 500);
            } else if (event.data === "ping") {
                document.getElementById('status').innerText = "Ожидаем загрузку ОС и туннеля Amnezia...";
            }
        };

        evtSource.onerror = function(err) {
            console.error("Ошибка SSE:", err);
        };
    </script>
</body>
</html>
