version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto_mtls
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - ./config:/mosquitto/config:rw
      - ./certs:/mosquitto/certs:rw
      - ./data:/mosquitto/data:rw
      - ./log:/mosquitto/log:rw
